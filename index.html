const { useState, useEffect, useRef, useCallback } = React;

// ─── AUDIO ENGINE ────────────────────────────────────────────────────────────
// All sound synthesis via Web Audio API — no libraries needed.
// One shared AudioContext, created lazily on first user gesture.

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === "suspended") _audioCtx.resume();
  return _audioCtx;
}

// Play a short beep: freq Hz, duration ms, wave shape, optional envelope
function playTone(freq, durationMs, type = "sine", gainVal = 0.18, fadeMs = 30) {
  try {
    const ctx = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(gainVal, ctx.currentTime + 0.008);
    gain.gain.setValueAtTime(gainVal, ctx.currentTime + (durationMs - fadeMs) / 1000);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + durationMs / 1000);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + durationMs / 1000 + 0.01);
  } catch(e) {}
}

// QRS beep — pitch tracks SpO2 (higher sat = higher pitch, like real monitors)
function playQRSBeep(spo2 = 98) {
  // Real monitors: 100% = 880Hz, 85% = ~440Hz, linear mapping
  const freq = 440 + ((spo2 - 70) / 30) * 440;
  playTone(Math.max(330, Math.min(1100, freq)), 80, "sine", 0.15, 25);
}

// Code alarm — urgent two-tone warble, called repeatedly by interval
function playCodeAlarm() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    // Two alternating tones: 880 → 1100 → 880 → ...
    [[0, 880], [0.15, 1100], [0.30, 880], [0.45, 1100]].forEach(([offset, freq]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "square";
      osc.frequency.setValueAtTime(freq, now + offset);
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.12, now + offset + 0.01);
      gain.gain.linearRampToValueAtTime(0, now + offset + 0.13);
      osc.start(now + offset);
      osc.stop(now + offset + 0.15);
    });
  } catch(e) {}
}

// Desat alarm — descending warble, pitch tied to SpO2 level
function playDesatAlarm(spo2) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const baseFreq = 300 + (spo2 - 70) * 8; // lower spo2 = lower pitch
    [[0, baseFreq + 200], [0.2, baseFreq]].forEach(([offset, freq]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(freq, now + offset);
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.10, now + offset + 0.015);
      gain.gain.linearRampToValueAtTime(0, now + offset + 0.18);
      osc.start(now + offset);
      osc.stop(now + offset + 0.20);
    });
  } catch(e) {}
}

// Brady alarm — slow low double-beep
function playBradyAlarm() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    [0, 0.22].forEach(offset => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.setValueAtTime(440, now + offset);
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.14, now + offset + 0.01);
      gain.gain.linearRampToValueAtTime(0, now + offset + 0.18);
      osc.start(now + offset);
      osc.stop(now + offset + 0.20);
    });
  } catch(e) {}
}

// BP alarm — mid-range double beep
function playBPAlarm() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    [0, 0.18].forEach(offset => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "triangle";
      osc.frequency.setValueAtTime(660, now + offset);
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.12, now + offset + 0.01);
      gain.gain.linearRampToValueAtTime(0, now + offset + 0.15);
      osc.start(now + offset);
      osc.stop(now + offset + 0.18);
    });
  } catch(e) {}
}

// Central alarm manager hook
function useAlarmAudio(rhythm, vitals, muted) {
  const alarmIntervalRef = useRef(null);
  const prevRhythmRef    = useRef(null);

  useEffect(() => {
    if (alarmIntervalRef.current) {
      clearInterval(alarmIntervalRef.current);
      alarmIntervalRef.current = null;
    }
    if (muted) return;

    const isCriticalRhythm = ["VFIB","ASYSTOLE","VTACH","TORSADES","IDIOVENTRICULAR","PACED_FAILURE"].includes(rhythm);
    const isDesat   = vitals.spo2 > 0 && vitals.spo2 < 92;
    const isBrady   = vitals.hr > 0 && vitals.hr < 40;
    const isLowBP   = vitals.sbp > 0 && vitals.sbp < 90;

    if (isCriticalRhythm) {
      // Rapid code alarm — fires every 600ms
      playCodeAlarm();
      alarmIntervalRef.current = setInterval(() => playCodeAlarm(), 600);
    } else if (isDesat) {
      // Desat alarm every 1.5s
      playDesatAlarm(vitals.spo2);
      alarmIntervalRef.current = setInterval(() => playDesatAlarm(vitals.spo2), 1500);
    } else if (isBrady) {
      playBradyAlarm();
      alarmIntervalRef.current = setInterval(() => playBradyAlarm(), 2000);
    } else if (isLowBP) {
      playBPAlarm();
      alarmIntervalRef.current = setInterval(() => playBPAlarm(), 2000);
    }

    prevRhythmRef.current = rhythm;
    return () => {
      if (alarmIntervalRef.current) clearInterval(alarmIntervalRef.current);
    };
  }, [rhythm, vitals.spo2, vitals.hr, vitals.sbp, muted]);
}

      { t: "B", pts: [[0.59,1.2],[0.61,0.4],[0.63,-0.4],[0.65,-0.7]] },
      { t: "B", pts: [[0.65,-0.7],[0.67,-0.4],[0.69,-0.1],[0.71,0]] },
      { t: "B", pts: [[0.71,0],[0.74,-0.10],[0.77,-0.24],[0.80,-0.28]] },
      { t: "B", pts: [[0.80,-0.28],[0.83,-0.22],[0.86,-0.06],[0.89,0]] },
      { t: "L", pts: [[0.89,0],[1.0,0]] },
    ],
  },
};


// ─── SEGMENT RENDERER ───────────────────────────────────────────────────────
// Paints one rhythm's bezier segments into a pre-allocated Float32Array buffer.
// noisePhase: running phase accumulator for continuous AFib fibrillatory noise
function paintSegments(segments, buf, numSamples, noisePhase = 0) {
  for (const seg of segments) {
    const [x0] = seg.pts[0];
    const [x1] = seg.pts[seg.pts.length - 1];
    const iStart = Math.floor(x0 * numSamples);
    const iEnd   = Math.ceil(x1 * numSamples);

    if (seg.t === "L") {
      const [, y0] = seg.pts[0];
      const [, y1] = seg.pts[1];
      for (let i = iStart; i <= iEnd && i < numSamples; i++) {
        const tt = iEnd === iStart ? 0 : (i - iStart) / (iEnd - iStart);
        buf[i] = y0 + (y1 - y0) * tt;
      }
    } else if (seg.t === "B") {
      const [[,p0y],[,p1y],[,p2y],[,p3y]] = seg.pts;
      for (let i = iStart; i <= iEnd && i < numSamples; i++) {
        const tt = iEnd === iStart ? 0 : (i - iStart) / (iEnd - iStart);
        const u = 1 - tt;
        buf[i] = u*u*u*p0y + 3*u*u*tt*p1y + 3*u*tt*tt*p2y + tt*tt*tt*p3y;
      }
    } else if (seg.t === "N") {
      // Fibrillatory noise — uses continuous phase so it doesn't reset each beat
      const amp = seg.amp || 0.07;
      for (let i = iStart; i <= iEnd && i < numSamples; i++) {
        const ph = noisePhase + i * 0.18;
        buf[i] = Math.sin(ph * 3.1)  * amp * 0.55
               + Math.sin(ph * 5.3 + 1.1) * amp * 0.35
               + Math.sin(ph * 8.7 + 2.3) * amp * 0.25
               + (Math.random() - 0.5) * amp * 0.18;
      }
    }
  }
}

// ─── BEAT GENERATOR ──────────────────────────────────────────────────────────
// Returns { buf: Float32Array, beatLen: number } for one beat tick.
// beatState: mutable object persisted across beats per rhythm instance.
function nextBeat(rhythmKey, basePixPerBeat, beatState) {
  // ── VFib: pure chaos, amplitude varies beat-to-beat ──────────────────────
  if (rhythmKey === "VFIB") {
    const len = basePixPerBeat;
    const buf = new Float32Array(len);
    const amp = 0.5 + Math.random() * 0.7; // amplitude wanders 0.5–1.2
    const f1 = 18 + Math.random() * 10;
    const f2 = 30 + Math.random() * 16;
    const f3 = 47 + Math.random() * 14;
    const ph = Math.random() * Math.PI * 2;
    for (let i = 0; i < len; i++) {
      const t = i / len;
      buf[i] = Math.sin(t * Math.PI * f1 + ph)         * amp * 0.55
             + Math.sin(t * Math.PI * f2 + ph + 1.2)   * amp * 0.35
             + Math.sin(t * Math.PI * f3 + ph + 2.4)   * amp * 0.20
             + (Math.random() - 0.5) * amp * 0.22;
    }
    return { buf, beatLen: len };
  }

  // ── Asystole: flat with occasional micro-wander ───────────────────────────
  if (rhythmKey === "ASYSTOLE") {
    const len = basePixPerBeat;
    const buf = new Float32Array(len);
    for (let i = 0; i < len; i++) buf[i] = (Math.random() - 0.5) * 0.015;
    return { buf, beatLen: len };
  }

  // ── Torsades: sinusoidally-modulated amplitude twisting ──────────────────
  if (rhythmKey === "TORSADES") {
    if (beatState.torsCount === undefined) beatState.torsCount = 0;
    beatState.torsCount++;
    // Amplitude envelope sinusoidally modulates over ~8 beats
    const envAmp = 0.4 + Math.abs(Math.sin(beatState.torsCount * 0.4)) * 1.2;
    const inv = Math.sin(beatState.torsCount * 0.35) > 0 ? 1 : -1; // axis flip
    const len = Math.round(basePixPerBeat * (0.9 + Math.random() * 0.2));
    const buf = new Float32Array(len);
    const scaledSegs = RHYTHMS.TORSADES.segments.map(seg => ({
      ...seg,
      pts: seg.pts.map(([x, y]) => [x, y * envAmp * inv])
    }));
    paintSegments(scaledSegs, buf, len);
    return { buf, beatLen: len };
  }

  // ── Sinus Arrest: normal beat + occasional long pause ────────────────────
  if (rhythmKey === "SINUS_ARREST") {
    if (beatState.saCount === undefined) beatState.saCount = 0;
    beatState.saCount++;
    // Every 3rd beat is a long pause (no QRS, no P)
    if (beatState.saCount % 3 === 0) {
      const pauseLen = Math.round(basePixPerBeat * (2.2 + Math.random() * 0.6));
      const buf = new Float32Array(pauseLen);
      for (let i = 0; i < pauseLen; i++) buf[i] = (Math.random() - 0.5) * 0.01;
      return { buf, beatLen: pauseLen };
    }
    const len = basePixPerBeat;
    const buf = new Float32Array(len);
    paintSegments(RHYTHMS.NSR.segments, buf, len);
    return { buf, beatLen: len };
  }

  // ── Wandering Pacemaker: P-wave morphology shifts beat to beat ────────────
  if (rhythmKey === "WANDERING_PM") {
    if (beatState.wpCount === undefined) beatState.wpCount = 0;
    beatState.wpCount++;
    const phase = beatState.wpCount % 3; // 0=upright, 1=flat, 2=inverted
    const pAmp = phase === 0 ? 0.22 : phase === 1 ? 0.08 : -0.18;
    const len = Math.round(basePixPerBeat * (0.95 + Math.random() * 0.12));
    const buf = new Float32Array(len);
    const wpSegs = [
      { t: "L", pts: [[0,0],[0.08,0]] },
      { t: "B", pts: [[0.08,0],[0.11,pAmp*0.8],[0.14,pAmp],[0.17,pAmp*0.8]] },
      { t: "B", pts: [[0.17,pAmp*0.8],[0.20,pAmp*0.4],[0.23,0],[0.26,0]] },
      { t: "L", pts: [[0.26,0],[0.32,0]] },
      { t: "B", pts: [[0.32,0],[0.34,-0.12],[0.35,-0.18],[0.36,-0.22]] },
      { t: "B", pts: [[0.36,-0.22],[0.365,0.5],[0.37,1.6],[0.375,2.4]] },
      { t: "B", pts: [[0.375,2.4],[0.38,1.0],[0.39,-0.35],[0.40,-0.42]] },
      { t: "B", pts: [[0.40,-0.42],[0.41,-0.2],[0.43,0],[0.46,0.04]] },
      { t: "L", pts: [[0.46,0.04],[0.54,0.06]] },
      { t: "B", pts: [[0.54,0.06],[0.57,0.12],[0.60,0.38],[0.63,0.45]] },
      { t: "B", pts: [[0.63,0.45],[0.66,0.38],[0.70,0.12],[0.74,0]] },
      { t: "L", pts: [[0.74,0],[1.0,0]] },
    ];
    paintSegments(wpSegs, buf, len);
    return { buf, beatLen: len };
  }

  // ── AFib with RUE noise phase ─────────────────────────────────────────────
  if (rhythmKey === "AFIB") {
    if (!beatState.noisePhase) beatState.noisePhase = 0;
    const jitter = 0.65 + Math.random() * 0.70;
    const len = Math.round(basePixPerBeat * jitter);
    const buf = new Float32Array(len);
    paintSegments(RHYTHMS.AFIB.segments, buf, len, beatState.noisePhase);
    beatState.noisePhase += len * 0.18;
    return { buf, beatLen: len };
  }


  // ── PVC Bigeminy: alternates normal NSR beat → PVC beat ──────────────────
  if (rhythmKey === "PVC") {
    if (beatState.pvcTurn === undefined) beatState.pvcTurn = false;
    beatState.pvcTurn = !beatState.pvcTurn;

    if (beatState.pvcTurn) {
      // PVC beat: wide bizarre complex, slightly longer RR (compensatory pause)
      const len = Math.round(basePixPerBeat * 1.10);
      const buf = new Float32Array(len);
      // Wide notched QRS + deep S + discordant T
      const pvcSegs = [
        { t: "L",  pts: [[0,0],[0.08,0]] },
        // Broad notched R (wide upstroke)
        { t: "B",  pts: [[0.08,0],[0.13,0.4],[0.18,1.2],[0.24,2.1]] },
        { t: "B",  pts: [[0.24,2.1],[0.27,2.5],[0.30,2.3],[0.33,1.6]] },
        // Notch in R
        { t: "B",  pts: [[0.33,1.6],[0.36,1.1],[0.37,0.9],[0.38,1.0]] },
        { t: "B",  pts: [[0.38,1.0],[0.40,1.1],[0.42,0.5],[0.45,-0.5]] },
        // Deep S
        { t: "B",  pts: [[0.45,-0.5],[0.47,-1.1],[0.50,-1.4],[0.53,-1.2]] },
        { t: "B",  pts: [[0.53,-1.2],[0.55,-0.8],[0.57,-0.3],[0.60,0]] },
        // Discordant T (opposite direction to main deflection)
        { t: "B",  pts: [[0.60,0],[0.63,-0.08],[0.66,-0.28],[0.69,-0.34]] },
        { t: "B",  pts: [[0.69,-0.34],[0.72,-0.28],[0.76,-0.08],[0.80,0]] },
        { t: "L",  pts: [[0.80,0],[1.0,0]] },
      ];
      paintSegments(pvcSegs, buf, len);
      return { buf, beatLen: len };
    } else {
      // Normal sinus beat (shorter — pre-PVC beat is slightly early)
      const len = Math.round(basePixPerBeat * 0.92);
      const buf = new Float32Array(len);
      paintSegments(RHYTHMS.NSR.segments, buf, len);
      return { buf, beatLen: len };
    }
  }

  // ── 3° Heart Block: dual oscillator ─────────────────────────────────────
  // VENTRICULAR ESCAPE rate ~32bpm. ATRIAL (SA node) rate ~75bpm.
  // P waves march INDEPENDENTLY — they drift through QRS complexes and T waves.
  // This creates the hallmark: NO consistent PR interval.
  // Sometimes a P appears just before a QRS (coincidence, not conduction).
  // Sometimes a P is buried inside or on top of a QRS or T wave.
  // The teaching trap: don't be fooled when PR "looks right" — check consistency.
  //
  // P wave amplitude is prominent (0.26 units) so students can clearly see them
  // marching through — especially when overlapping QRS and T.
  if (rhythmKey === "HEART_BLOCK_3") {
    if (beatState.pPhase === undefined) beatState.pPhase = 0.05; // offset so first P is visible
    const len = basePixPerBeat; // length of one ventricular beat
    const buf = new Float32Array(len);

    // ── Step 1: Paint the wide ventricular escape complex ───────────────────
    const vSegs = [
      // Long pre-QRS flat (slow rate = long TP segment)
      { t: "L",  pts: [[0,0],[0.09,0]] },
      // Wide bizarre QRS upstroke — slurred, not sharp
      { t: "B",  pts: [[0.09,0],[0.094,-0.06],[0.098,-0.12],[0.101,-0.18]] },
      // Broad R wave ascent
      { t: "B",  pts: [[0.101,-0.18],[0.107,0.50],[0.114,1.70],[0.119,2.40]] },
      // Notched near peak (characteristic of ventricular beats)
      { t: "B",  pts: [[0.119,2.40],[0.123,2.60],[0.127,2.45],[0.131,2.10]] },
      // Broad slurred descent
      { t: "B",  pts: [[0.131,2.10],[0.138,0.80],[0.145,-0.40],[0.150,-0.60]] },
      // Wide S wave, slow return
      { t: "B",  pts: [[0.150,-0.60],[0.156,-0.38],[0.162,-0.12],[0.167,0]] },
      // Slightly elevated ST (discordant to QRS)
      { t: "L",  pts: [[0.167,0],[0.196,0.06]] },
      // T wave: BROAD and DISCORDANT (opposite polarity to main QRS deflection)
      // Since QRS is mostly positive, T is inverted/biphasic
      { t: "B",  pts: [[0.196,0.06],[0.210,-0.02],[0.228,-0.26],[0.244,-0.46]] },
      { t: "B",  pts: [[0.244,-0.46],[0.260,-0.34],[0.276,-0.12],[0.290,-0.02]] },
      { t: "B",  pts: [[0.290,-0.02],[0.296,-0.01],[0.302,0],[0.310,0]] },
      // Long isoelectric baseline (most of the beat at 32bpm)
      { t: "L",  pts: [[0.310,0],[1.0,0]] },
    ];
    paintSegments(vSegs, buf, len);

    // ── Step 2: Overlay independent P waves ─────────────────────────────────
    // Atrial rate 75bpm, ventricular 32bpm → pPeriod = 32/75 = 0.4267 of beat length
    // This gives ~2.34 P waves per ventricular beat — creates marching pattern
    const pPeriod = (32 / 75);
    let pStart = beatState.pPhase;

    // Render a smooth rounded P wave at fractional position pStart
    const renderP = (fStart, amplitude) => {
      const pWidth = 0.10; // 10% of beat — slightly wide, normal P morphology
      const iS = Math.floor(fStart * len);
      const iE = Math.ceil((fStart + pWidth) * len);
      for (let i = iS; i <= iE && i < len; i++) {
        const tt = Math.max(0, Math.min(1, (i - iS) / Math.max(1, iE - iS)));
        const u = 1 - tt;
        // Smooth symmetric hump: gentle rise, rounded peak, gentle fall
        const py = u*u*u*0 + 3*u*u*tt*(amplitude*0.95) + 3*u*tt*tt*(amplitude*0.95) + tt*tt*tt*0;
        // Additional slight asymmetry: real P waves have slight upstroke peak before center
        const asymm = amplitude * 0.06 * Math.sin(tt * Math.PI * 1.2);
        buf[i] = (buf[i] || 0) + py + asymm;
      }
    };

    while (pStart < 1.02) { // slight overshoot to catch Ps near end
      if (pStart >= 0 && pStart < 1.0) {
        renderP(pStart, 0.26); // 0.26 = prominent enough to see even when overlapping T
      }
      pStart += pPeriod;
    }

    // Advance pPhase for next beat — carry over remainder
    // The phase advances by (1.0 mod pPeriod), so Ps drift across the QRS over cycles
    beatState.pPhase = (beatState.pPhase - 1.0 + pPeriod * 20) % pPeriod;
    // No additional drift — the natural modulo arithmetic creates the march

    return { buf, beatLen: len };
  }

  // ── VTach: slight beat-to-beat amplitude variation (can be polymorphic) ───
  if (rhythmKey === "VTACH") {
    if (!beatState.vtAmp) beatState.vtAmp = 1.0;
    // Amplitude wanders slowly
    beatState.vtAmp += (Math.random() - 0.5) * 0.06;
    beatState.vtAmp = Math.max(0.75, Math.min(1.25, beatState.vtAmp));
    const amp = beatState.vtAmp;

    const len = Math.round(basePixPerBeat * (1 + (Math.random() - 0.5) * 0.05));
    const buf = new Float32Array(len);
    // Scale the VTach segments by amplitude
    const scaledSegs = RHYTHMS.VTACH.segments.map(seg => ({
      ...seg,
      pts: seg.pts.map(([x, y]) => [x, y * amp])
    }));
    paintSegments(scaledSegs, buf, len);
    return { buf, beatLen: len };
  }

  // ── Default: regular beat with minor baseline wander ─────────────────────
  const r = RHYTHMS[rhythmKey];
  // Add tiny baseline wander (±0.015) to all regular rhythms for realism
  if (!beatState.wander) beatState.wander = 0;
  beatState.wander += (Math.random() - 0.5) * 0.008;
  beatState.wander *= 0.97; // slowly revert to zero
  beatState.wander = Math.max(-0.04, Math.min(0.04, beatState.wander));
  const wander = beatState.wander;

  const len = basePixPerBeat;
  const buf = new Float32Array(len);
  paintSegments(r.segments, buf, len);
  // Apply wander offset
  for (let i = 0; i < len; i++) buf[i] += wander;
  return { buf, beatLen: len };
}

// ─── ECG CANVAS ─────────────────────────────────────────────────────────────
// Real-time scrolling strip. Per-beat irregularity handled by nextBeat().
function ECGCanvas({ rhythm, height = 160, gridColor = "rgba(0,80,40,0.35)", bgColor = "#000d08", spo2 = 98, muted = false }) {
  const canvasRef = useRef(null);
  const animRef   = useRef(null);
  const stateRef  = useRef({ rhythm: null, ringBuf: null, writePos: 0, beatBuf: null, beatPos: 0, beatLen: 0, beatState: {}, basePixPerBeat: 200 });

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    const RING = W * 5;

    const st = stateRef.current;
    if (!st.ringBuf || st.ringBuf.length !== RING) {
      st.ringBuf = new Float32Array(RING);
      st.writePos = 0;
    }

    const getBase = (rKey) => {
      const r = RHYTHMS[rKey];
      if (!r || r.rate <= 0) return Math.round(W * 0.9);
      // 25mm/s paper speed: ~130px per beat at 75bpm feels natural on screen
      return Math.round((60 / r.rate) * 120);
    };

    let rKey = rhythm;
    st.rhythm  = rKey;
    st.beatState = {};
    st.basePixPerBeat = getBase(rKey);
    let nb = nextBeat(rKey, st.basePixPerBeat, st.beatState);
    st.beatBuf = nb.buf; st.beatLen = nb.beatLen; st.beatPos = 0;

    const SPEED = 2; // 2px/frame @ 60fps — beat scrolls at real cardiac tempo

    const hexToRgba = (hex, a) => {
      const c = hex.replace("#","");
      return `rgba(${parseInt(c.slice(0,2),16)},${parseInt(c.slice(2,4),16)},${parseInt(c.slice(4,6),16)},${a})`;
    };

    const draw = () => {
      if (rhythm !== st.rhythm) {
        st.rhythm = rKey = rhythm;
        st.beatState = {};
        st.basePixPerBeat = getBase(rKey);
        nb = nextBeat(rKey, st.basePixPerBeat, st.beatState);
        st.beatBuf = nb.buf; st.beatLen = nb.beatLen; st.beatPos = 0;
      }

      for (let s = 0; s < SPEED; s++) {
        st.ringBuf[st.writePos % RING] = st.beatBuf[Math.min(st.beatPos, st.beatLen - 1)];
        st.writePos++;
        if (++st.beatPos >= st.beatLen) {
          st.beatPos = 0;
          nb = nextBeat(rKey, st.basePixPerBeat, st.beatState);
          st.beatBuf = nb.buf; st.beatLen = nb.beatLen;
          // QRS beep — skip for flat/chaotic rhythms
          if (!muted && !["VFIB","ASYSTOLE","TORSADES"].includes(rKey)) {
            playQRSBeep(spo2);
          }
        }
      }

      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, W, H);

      // Grid
      const sm = 20, lg = 100;
      ctx.lineWidth = 0.5;
      for (let x = 0; x < W; x += sm) {
        ctx.strokeStyle = x % lg === 0 ? "rgba(0,100,50,0.45)" : gridColor;
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
      }
      for (let y = 0; y < H; y += sm) {
        ctx.strokeStyle = y % lg === 0 ? "rgba(0,100,50,0.45)" : gridColor;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
      }

      const color = RHYTHMS[rKey]?.color || "#00ff88";
      const mid   = H * 0.55;
      const scale = H * 0.34;

      // Glow
      ctx.beginPath();
      ctx.strokeStyle = hexToRgba(color, 0.18);
      ctx.lineWidth = 5; ctx.lineJoin = "round"; ctx.lineCap = "round";
      for (let x = 0; x < W; x++) {
        const idx = (st.writePos - W + x + RING * 4) % RING;
        const y = mid - st.ringBuf[idx] * scale;
        x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();

      // Trace
      ctx.beginPath();
      ctx.strokeStyle = color; ctx.lineWidth = 1.8;
      ctx.shadowColor = color; ctx.shadowBlur = 4;
      for (let x = 0; x < W; x++) {
        const idx = (st.writePos - W + x + RING * 4) % RING;
        const y = mid - st.ringBuf[idx] * scale;
        x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Sweep wipe
      const g = ctx.createLinearGradient(W-18, 0, W, 0);
      g.addColorStop(0, "transparent"); g.addColorStop(1, bgColor);
      ctx.fillStyle = g; ctx.fillRect(W-18, 0, 18, H);

      animRef.current = requestAnimationFrame(draw);
    };

    animRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [rhythm, height, bgColor, gridColor]);

  return <canvas ref={canvasRef} width={900} height={height} style={{ width:"100%", height:`${height}px`, display:"block" }} />;
}

// ─── PLETH (SpO2) CANVAS ─────────────────────────────────────────────────────
// Realistic plethysmography waveform: smooth rounded peaks, filled blue gradient
function PlethCanvas({ hr = 72, spo2 = 98, height = 70 }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const stateRef = useRef({ writePos: 0, ringBuf: null });

  // Build one pleth beat: dicrotic notch + main peak
  const buildPlethBeat = useCallback((numSamples) => {
    const buf = new Float32Array(numSamples);
    for (let i = 0; i < numSamples; i++) {
      const t = i / numSamples;
      // Main upstroke + systolic peak
      let val = 0;
      if (t < 0.35) {
        // Rapid upstroke — logistic
        val = 1 / (1 + Math.exp(-18 * (t - 0.14)));
      } else if (t < 0.55) {
        // Systolic peak → dicrotic notch
        const tt = (t - 0.35) / 0.2;
        val = 1.0 - tt * 0.28 + Math.sin(tt * Math.PI) * 0.04;
      } else if (t < 0.65) {
        // Dicrotic notch dip
        const tt = (t - 0.55) / 0.10;
        val = 0.72 - Math.sin(tt * Math.PI) * 0.12;
      } else if (t < 0.80) {
        // Dicrotic wave secondary peak
        const tt = (t - 0.65) / 0.15;
        val = 0.60 + Math.sin(tt * Math.PI) * 0.12;
      } else {
        // Slow diastolic run-off
        const tt = (t - 0.80) / 0.20;
        val = 0.72 * Math.exp(-tt * 2.8);
      }
      buf[i] = Math.max(0, val);
    }
    return buf;
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    const RING = W * 4;

    const st = stateRef.current;
    if (!st.ringBuf || st.ringBuf.length !== RING) {
      st.ringBuf = new Float32Array(RING);
      st.writePos = 0;
    }

    const rate = Math.max(20, Math.min(200, hr));
    let beatLen = Math.round((60 / rate) * 120);
    let beatBuf = buildPlethBeat(beatLen);
    let beatPos = 0;
    const SPEED = 2; // match ECG speed

    const draw = () => {
      // Generate samples
      for (let s = 0; s < SPEED; s++) {
        st.ringBuf[st.writePos % RING] = beatBuf[Math.min(beatPos, beatLen - 1)];
        st.writePos++;
        beatPos++;
        if (beatPos >= beatLen) {
          beatPos = 0;
          const newRate = Math.max(20, Math.min(200, hr));
          beatLen = Math.round((60 / newRate) * 120);
          beatBuf = buildPlethBeat(beatLen);
        }
      }

      // Amplitude modulation based on SpO2
      const amp = spo2 < 90 ? 0.4 + (spo2 - 80) * 0.06 : 1.0;

      ctx.fillStyle = "#00050f";
      ctx.fillRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = "rgba(0,40,100,0.3)";
      ctx.lineWidth = 0.5;
      for (let x = 0; x < W; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

      const pad = 6;
      const range = H - pad * 2;

      // Build path
      const pts = [];
      for (let x = 0; x < W; x++) {
        const idx = (st.writePos - W + x + RING * 4) % RING;
        const val = st.ringBuf[idx] * amp;
        const y = H - pad - val * range;
        pts.push([x, y]);
      }

      // Filled gradient under curve
      const fillGrad = ctx.createLinearGradient(0, pad, 0, H);
      fillGrad.addColorStop(0, "rgba(0,150,255,0.45)");
      fillGrad.addColorStop(0.5, "rgba(0,100,220,0.20)");
      fillGrad.addColorStop(1, "rgba(0,60,180,0.04)");

      ctx.beginPath();
      ctx.moveTo(0, H);
      pts.forEach(([x, y]) => ctx.lineTo(x, y));
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fillStyle = fillGrad;
      ctx.fill();

      // Glow trace
      ctx.beginPath();
      pts.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
      ctx.strokeStyle = "rgba(60,160,255,0.25)";
      ctx.lineWidth = 5;
      ctx.lineJoin = "round";
      ctx.stroke();

      // Main blue line
      ctx.beginPath();
      pts.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
      ctx.strokeStyle = "#3ab0ff";
      ctx.lineWidth = 2;
      ctx.shadowColor = "#3ab0ff";
      ctx.shadowBlur = 5;
      ctx.lineJoin = "round";
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Sweep wipe
      const sweep = 18;
      const g = ctx.createLinearGradient(W - sweep, 0, W, 0);
      g.addColorStop(0, "transparent");
      g.addColorStop(1, "#00050f");
      ctx.fillStyle = g;
      ctx.fillRect(W - sweep, 0, sweep, H);

      animRef.current = requestAnimationFrame(draw);
    };

    animRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [hr, spo2, buildPlethBeat]);

  return (
    <canvas
      ref={canvasRef}
      width={900}
      height={height}
      style={{ width: "100%", height: `${height}px`, display: "block" }}
    />
  );
}

// ─── BEDSIDE MONITOR VIEW ───────────────────────────────────────────────────
function BedsideMonitor({ state }) {
  const { vitals, rhythm, patient, alarms } = state;
  const r = RHYTHMS[rhythm];
  const isCritical = ["VFIB","ASYSTOLE","VTACH","TORSADES","IDIOVENTRICULAR","PACED_FAILURE"].includes(rhythm);
  const [blink, setBlink] = useState(false);
  const [muted, setMuted] = useState(false);

  // Alarm audio
  useAlarmAudio(rhythm, vitals, muted);

  useEffect(() => {
    if (isCritical) {
      const t = setInterval(() => setBlink(b => !b), 500);
      return () => clearInterval(t);
    }
    setBlink(false);
  }, [isCritical]);

  const vitalBox = (label, value, unit, color, critical = false) => (
    <div style={{
      background: critical && blink ? "rgba(255,40,40,0.3)" : "rgba(0,20,15,0.8)",
      border: `1px solid ${critical ? "#ff4444" : color}`,
      borderRadius: 4, padding: "8px 12px", minWidth: 110,
      transition: "background 0.2s"
    }}>
      <div style={{ color: "#aaa", fontSize: 11, fontFamily: "monospace", letterSpacing: 2, marginBottom: 2 }}>{label}</div>
      <div style={{ color: critical ? "#ff4444" : color, fontSize: 36, fontFamily: "'Courier New', monospace", fontWeight: "bold", lineHeight: 1 }}>{value}</div>
      <div style={{ color: "#666", fontSize: 11, fontFamily: "monospace" }}>{unit}</div>
    </div>
  );

  return (
    <div style={{ background: "#000a0a", minHeight: "100vh", color: "#00ff88", fontFamily: "monospace", padding: 16 }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, borderBottom: "1px solid #002a1a", paddingBottom: 8 }}>
        <div>
          <span style={{ color: "#00ff88", fontSize: 14, fontWeight: "bold" }}>{patient.name}</span>
          <span style={{ color: "#555", fontSize: 11, marginLeft: 16 }}>MRN: {patient.mrn}</span>
          <span style={{ color: "#555", fontSize: 11, marginLeft: 16 }}>Room: {patient.room}</span>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <span style={{ color: isCritical ? (blink ? "#ff4444" : "#880000") : "#00aa55", fontSize: 11, border: `1px solid ${isCritical ? "#ff4444" : "#00aa55"}`, padding: "2px 8px", borderRadius: 2 }}>
            {isCritical ? "⚠ ALARM" : "● MONITORING"}
          </span>
          <button onClick={() => setMuted(m => !m)} style={{
            fontSize: 11, padding: "3px 10px", borderRadius: 3, cursor: "pointer",
            border: `1px solid ${muted ? "#ff6644" : "#336644"}`,
            background: muted ? "rgba(255,100,68,0.15)" : "rgba(0,100,60,0.15)",
            color: muted ? "#ff6644" : "#00cc66", fontFamily: "monospace"
          }}>
            {muted ? "🔇 MUTED" : "🔊 SOUND ON"}
          </button>
          <span style={{ color: "#444", fontSize: 10 }}>{new Date().toLocaleTimeString()}</span>
        </div>
      </div>

      {/* ECG */}
      <div style={{ marginBottom: 8 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span style={{ color: r.color, fontSize: 11, letterSpacing: 2 }}>I · ECG · 25mm/s</span>
          <span style={{ color: isCritical ? (blink ? "#ff4444" : "#880000") : r.color, fontSize: 12, fontWeight: "bold" }}>{r.label}</span>
        </div>
        <div style={{ border: `1px solid ${isCritical ? "#ff4444" : "#002a1a"}`, borderRadius: 4, overflow: "hidden" }}>
          <ECGCanvas rhythm={rhythm} height={140} spo2={vitals.spo2} muted={muted} />
        </div>
      </div>

      {/* SpO2 Pleth */}
      <div style={{ color: "#3ab0ff", fontSize: 10, letterSpacing: 2, marginBottom: 4 }}>PLETH · SpO₂ · {vitals.spo2}%</div>
      <div style={{ border: "1px solid #001a2a", borderRadius: 4, overflow: "hidden", marginBottom: 12 }}>
        <PlethCanvas hr={vitals.hr} spo2={vitals.spo2} height={70} />
      </div>

      {/* Vitals Grid */}
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        {vitalBox("HR", r.rate > 0 ? vitals.hr : "---", "bpm", "#00ff88", vitals.hr > 150 || vitals.hr < 40)}
        {vitalBox("BP", `${vitals.sbp}/${vitals.dbp}`, "mmHg", "#ffcc00", vitals.sbp < 90 || vitals.sbp > 180)}
        {vitalBox("MAP", vitals.map, "mmHg", "#ffaa00", vitals.map < 65)}
        {vitalBox("SpO₂", `${vitals.spo2}%`, "", "#0099ff", vitals.spo2 < 92)}
        {vitalBox("RR", vitals.rr, "/min", "#cc44ff", vitals.rr > 24 || vitals.rr < 8)}
        {vitalBox("TEMP", vitals.temp, "°F", "#ff6644", vitals.temp > 101 || vitals.temp < 96)}
        {vitalBox("EtCO₂", vitals.etco2, "mmHg", "#44ffcc", vitals.etco2 > 50 || vitals.etco2 < 25)}
      </div>

      {/* Active alarms */}
      {alarms.length > 0 && (
        <div style={{ marginTop: 12, padding: "8px 12px", background: "rgba(255,40,40,0.1)", border: "1px solid #ff4444", borderRadius: 4 }}>
          {alarms.map((a, i) => <div key={i} style={{ color: "#ff6666", fontSize: 12 }}>⚠ {a}</div>)}
        </div>
      )}
    </div>
  );
}

// ─── STUDENT EMR VIEW ───────────────────────────────────────────────────────
function StudentEMR({ state, onMARUpdate }) {
  const { patient, vitals, labs, medications, rhythm } = state;
  const [activeTab, setActiveTab] = useState("chart");
  const [scanInput, setScanInput] = useState("");
  const [scanMessage, setScanMessage] = useState(null);
  const [scanningMed, setScanningMed] = useState(null);

  const isLow = (val, ref) => {
    const [lo] = ref.split("-").map(parseFloat);
    return parseFloat(val) < lo;
  };
  const isHigh = (val, ref) => {
    const parts = ref.split("-");
    if (parts.length < 2) return false;
    return parseFloat(val) > parseFloat(parts[1]);
  };

  const handleScan = (medId) => {
    const med = medications.find(m => m.id === medId);
    if (!med) return;
    setScanningMed(medId);
    setScanInput("");
    setScanMessage(null);
  };

  const processScan = (medId) => {
    const med = medications.find(m => m.id === medId);
    if (!med) return;
    if (scanInput.trim() === med.barcode) {
      setScanMessage({ type: "success", text: `✓ ${med.drug} verified — scan matches order` });
      onMARUpdate(medId, "scanned", true);
    } else {
      setScanMessage({ type: "error", text: `✗ Barcode mismatch — verify medication before administering` });
    }
  };

  const handleCheckoff = (medId, check) => {
    const med = medications.find(m => m.id === medId);
    if (!med) return;
    if (!med.scanned) { setScanMessage({ type: "error", text: "Scan medication barcode before signing off" }); return; }
    onMARUpdate(medId, check, true);
    if (check === "check1" && med.check2) markGiven(medId);
    if (check === "check2" && med.check1) markGiven(medId);
  };

  const markGiven = (medId) => {
    onMARUpdate(medId, "status", "given");
  };

  const tabs = ["chart", "labs", "mar", "notes"];

  return (
    <div style={{ background: "#f0f4f8", minHeight: "100vh", fontFamily: "'Georgia', serif" }}>
      {/* EMR Header */}
      <div style={{ background: "#1a3a5c", color: "white", padding: "10px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <span style={{ fontSize: 18, fontWeight: "bold" }}>SimChart EMR</span>
          <span style={{ fontSize: 11, marginLeft: 16, color: "#aac4e0" }}>Nursing Education System</span>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 14, fontWeight: "bold" }}>{patient.name}</div>
          <div style={{ fontSize: 11, color: "#aac4e0" }}>{patient.mrn} · DOB: {patient.dob} · {patient.room}</div>
        </div>
      </div>

      {/* Allergy banner */}
      <div style={{ background: "#fff3cd", borderBottom: "2px solid #ffc107", padding: "4px 20px", fontSize: 12, color: "#856404" }}>
        <strong>⚠ ALLERGIES:</strong> {patient.allergies.join(", ")}
      </div>

      {/* Quick vitals bar */}
      <div style={{ background: "#e8f0f8", borderBottom: "1px solid #c5d5e8", padding: "6px 20px", display: "flex", gap: 24, fontSize: 12 }}>
        {[["HR", vitals.hr + " bpm", vitals.hr > 150 || vitals.hr < 40],
          ["BP", `${vitals.sbp}/${vitals.dbp}`, vitals.sbp < 90],
          ["SpO₂", vitals.spo2 + "%", vitals.spo2 < 92],
          ["RR", vitals.rr + "/min", vitals.rr > 24],
          ["Temp", vitals.temp + "°F", vitals.temp > 101],
          ["Rhythm", RHYTHMS[rhythm].label, rhythm === "VFIB" || rhythm === "VTACH" || rhythm === "ASYSTOLE"]
        ].map(([label, val, crit]) => (
          <span key={label}>
            <span style={{ color: "#555" }}>{label}: </span>
            <span style={{ color: crit ? "#dc3545" : "#1a3a5c", fontWeight: crit ? "bold" : "normal" }}>{val}</span>
            {crit && <span style={{ color: "#dc3545" }}> ⚠</span>}

      </div>

      {/* Tabs */}
      <div style={{ background: "#1a3a5c", display: "flex", paddingLeft: 20 }}>
        {tabs.map(t => (
          <button key={t} onClick={() => setActiveTab(t)} style={{
            background: activeTab === t ? "#f0f4f8" : "transparent",
            color: activeTab === t ? "#1a3a5c" : "#aac4e0",
            border: "none", padding: "8px 20px", cursor: "pointer",

              <h3 style={{ color: "#1a3a5c", fontSize: 13, marginBottom: 12, borderBottom: "1px solid #e0e8f0", paddingBottom: 6 }}>Active Diagnoses</h3>
              {["Hypertensive urgency", "Acute decompensated heart failure", "CKD Stage 3", "Type 2 Diabetes Mellitus"].map(d => (

              </p>

        )}

        {/* LABS TAB */}
        {activeTab === "labs" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
            {[
              { title: "Basic Metabolic Panel", keys: ["sodium","potassium","chloride","co2","bun","creatinine","glucose","magnesium"] },

                <h3 style={{ color: "#1a3a5c", fontSize: 13, marginBottom: 10, borderBottom: "2px solid #1a3a5c", paddingBottom: 6 }}>{panel.title}</h3>
                <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                  <thead><tr style={{ color: "#888" }}>

                    <th style={{ textAlign: "right", paddingBottom: 4 }}>Value</th>

              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>

                      {scanningMed === med.id ? (

                            placeholder="Scan or type barcode → Enter"
                            autoFocus
                            style={{ fontSize: 12, padding: "4px 8px", border: "1px solid #1a3a5c", borderRadius: 4, width: 220, fontFamily: "monospace" }}
                          />
                          <button onClick={() => processScan(med.id)} style={{ fontSize: 11, padding: "4px 10px", background: "#1a3a5c", color: "white", border: "none", borderRadius: 4, cursor: "pointer" }}>Verify</button>
                          <button onClick={() => { setScanningMed(null); setScanInput(""); }} style={{ fontSize: 11, padding: "4px 10px", background: "#6c757d", color: "white", border: "none", borderRadius: 4, cursor: "pointer" }}>Cancel</button>
                        </>
                      ) : (
                        <button onClick={() => handleScan(med.id)} style={{
                          fontSize: 12, padding: "5px 14px", cursor: "pointer", borderRadius: 4, border: "none",
                          background: med.scanned ? "#d4edda" : "#1a3a5c", color: med.scanned ? "#155724" : "white", fontWeight: "bold"
                        }}>
                          {med.scanned ? "✓ Barcode Verified" : "📷 Scan Barcode"}
                        </button>
                      )}
                    </div>

                    {/* Double check-off */}
                    <div style={{ display: "flex", gap: 12 }}>
                      {[["check1", "Nurse 1 Sign-off"], ["check2", "Nurse 2 Sign-off"]].map(([key, label]) => (
                        <button key={key} onClick={() => handleCheckoff(med.id, key)} style={{
                          fontSize: 11, padding: "5px 12px", borderRadius: 4, cursor: "pointer",
                          border: `1px solid ${med[key] ? "#28a745" : "#ccc"}`,
                          background: med[key] ? "#d4edda" : "#f8f9fa",
                          color: med[key] ? "#155724" : "#555"
                        }}>
                          {med[key] ? `✓ ${label}` : `☐ ${label}`}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
                {med.status === "given" && (
                  <div style={{ marginTop: 8, fontSize: 12, color: "#28a745", fontWeight: "bold" }}>✓ Administered — Double check-off complete</div>
                )}
              </div>
            ))}
          </div>
        )}

        {activeTab === "notes" && (
          <div style={{ background: "white", borderRadius: 6, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.1)" }}>
            <h3 style={{ color: "#1a3a5c", marginBottom: 16 }}>Nursing Notes</h3>
            <textarea rows={8} placeholder="Enter nursing note..." style={{ width: "100%", fontSize: 13, padding: 10, border: "1px solid #ccc", borderRadius: 4, fontFamily: "Georgia, serif", lineHeight: 1.6, boxSizing: "border-box" }} />
            <button style={{ marginTop: 8, padding: "6px 20px", background: "#1a3a5c", color: "white", border: "none", borderRadius: 4, cursor: "pointer", fontSize: 12 }}>Sign & Save Note</button>
          </div>
        )}
      </div>
    </div>
  );
}

    { category:"Critical Care", name:"Acute Liver Failure", rhythm:"STACH",
      vitals:{ hr:118, sbp:96, dbp:58, spo2:95, rr:20, temp:100.2, etco2:32, map:71 },
      labs:{ glucose:{val:48}, sodium:{val:128}, creatinine:{val:2.2}, ph:{val:7.30}, hco3:{val:16}, platelets:{val:62} },
      interventions:["NAC IV if acetaminophen cause (even late — still beneficial)","D10W infusion for hypoglycemia (goal glucose 140-180)","Lactulose 30mL PO Q2H (goal 2-3 soft stools/day for encephalopathy)","Rifaximin 550mg BID (gut decontamination)","FFP for active bleeding or INR >2 before procedures","Transplant evaluation — King's College Criteria","Avoid hepatotoxins, sedatives, nephrotoxins"],
      medications:[
        {id:1,drug:"NAC",dose:"150mg/kg",route:"IV",freq:"If APAP cause",barcode:"NAC-IV",due:"If APAP",status:"scheduled",check1:false,check2:false,scanned:false},

        {id:3,drug:"Lactulose",dose:"30mL",route:"PO/NG",freq:"Q2H until 2-3 stools",barcode:"LAC-PO",due:"NOW",status:"due",check1:false,check2:false,scanned:false},
        {id:4,drug:"Fresh Frozen Plasma",dose:"2 units",route:"IV",freq:"Active bleeding/procedures",barcode:"FFP-IV",due:"PRN",status:"scheduled",check1:false,check2:false,scanned:false},
      ]},
    { category:"Critical Care", name:"Massive GI Bleed", rhythm:"STACH",
      vitals:{ hr:138, sbp:78, dbp:48, spo2:94, rr:22, temp:98.4, etco2:28, map:58 },
      labs:{ hgb:{val:5.8}, hct:{val:17.4}, platelets:{val:88}, creatinine:{val:1.6}, ph:{val:7.28} },
      interventions:["Two large bore IVs (#16 or larger) — both antecubital","Massive transfusion protocol: 1:1:1 ratio (pRBC:FFP:Platelets)","Pantoprazole 80mg IV bolus then 8mg/hr drip","Octreotide 50mcg IV bolus then 50mcg/hr if variceal suspected","Type and cross-match for 6 units pRBC","GI consult for emergent endoscopy","Foley catheter for hourly UO"],
      medications:[
        {id:1,drug:"pRBC",dose:"2 units",route:"IV",freq:"Rapid, per MTP",barcode:"PRBC-IV",due:"NOW",status:"due",check1:false,check2:false,scanned:false},
        {id:2,drug:"Pantoprazole",dose:"80mg",route:"IV",freq:"Bolus, then 8mg/hr drip",barcode:"PAN-080-IV",due:"NOW",status:"due",check1:false,check2:false,scanned:false},
        {id:3,drug:"Octreotide",dose:"50 mcg",route:"IV",freq:"Bolus then 50mcg/hr",barcode:"OCT-050-IV",due:"If variceal",status:"scheduled",check1:false,check2:false,scanned:false},
        {id:4,drug:"FFP",dose:"2 units",route:"IV",freq:"With each 2 units pRBC",barcode:"FFP-IV",due:"With pRBC",status:"due",check1:false,check2:false,scanned:false},
      ]},
    // BASELINE
    { category:"Baseline", name:"Stable Post-Op Day 1", rhythm:"NSR",
      vitals:{ hr:72, sbp:118, dbp:76, spo2:98, rr:14, temp:98.6, etco2:38, map:90 },
      labs:{ sodium:{val:138}, potassium:{val:4.1}, creatinine:{val:1.0}, glucose:{val:104}, hgb:{val:13.4} },
      interventions:["Routine VS Q4H","Pain assessment Q4H — multimodal analgesia","Incentive spirometry Q2H while awake","Ambulate BID minimum","DVT prophylaxis per protocol","Diet advancement per orders — advance as tolerated"],
      medications:[
        {id:1,drug:"Metoprolol",dose:"25mg",route:"PO",freq:"BID",barcode:"MET-025-PO",due:"0800",status:"due",check1:false,check2:false,scanned:false},
        {id:2,drug:"Lisinopril",dose:"10mg",route:"PO",freq:"Daily",barcode:"LIS-010-PO",due:"0800",status:"due",check1:false,check2:false,scanned:false},
        {id:3,drug:"Furosemide",dose:"40mg",route:"IV",freq:"BID",barcode:"FUR-040-IV",due:"0800",status:"due",check1:false,check2:false,scanned:false},
        {id:4,drug:"Aspirin",dose:"81mg",route:"PO",freq:"Daily",barcode:"ASA-081-PO",due:"0800",status:"due",check1:false,check2:false,scanned:false},
      ]},
  ];

  const scenarioCategories = ["All", ...new Set(ALL_SCENARIOS.map(s => s.category))];
  const filteredScenarios = scenarioCat === "All" ? ALL_SCENARIOS : ALL_SCENARIOS.filter(s => s.category === scenarioCat);

  const applyScenario = (s) => {
    const r = RHYTHMS[s.rhythm];
    onUpdate("scenario", s.name);
    onUpdate("rhythm", s.rhythm);
    if (r?.vitals) onUpdate("vitals", { ...vitals, ...r.vitals });
    if (s.vitals) onUpdate("vitals", { ...(r?.vitals || vitals), ...s.vitals });
    const newLabs = { ...state.labs };
    if (s.labs) Object.entries(s.labs).forEach(([k, v]) => { newLabs[k] = { ...newLabs[k], ...v }; });
    onUpdate("labs", newLabs);
    if (s.medications) onUpdate("medications", s.medications);
    setActiveScenario(s.name === activeScenario ? null : s.name);
  };

  const currentScenarioData = ALL_SCENARIOS.find(s => s.name === activeScenario);

  // When rhythm is selected, auto-apply its physiologic vitals
  const selectRhythm = (key) => {
    const r = RHYTHMS[key];
    onUpdate("rhythm", key);
    if (r?.vitals) onUpdate("vitals", { ...vitals, ...r.vitals });
  };

  const setVital = (key, val) => onUpdate("vitals", { ...vitals, [key]: parseFloat(val) || 0 });
  const setLab   = (key, val) => onUpdate("labs",   { ...state.labs, [key]: { ...state.labs[key], val: parseFloat(val) || val } });

  // Group rhythms by category
  const rhythmCategories = {};
  Object.entries(RHYTHMS).forEach(([key, r]) => {
    if (!rhythmCategories[r.category]) rhythmCategories[r.category] = [];
    rhythmCategories[r.category].push({ key, ...r });
  });

  const severityBorder = { normal: "#00ff88", warning: "#ffcc00", critical: "#ff4444" };
  const severityBg     = { normal: "rgba(0,255,136,0.08)", warning: "rgba(255,200,0,0.08)", critical: "rgba(255,60,60,0.10)" };

  const catColors = {
    Cardiac:"#ff6b6b", Pulmonary:"#74b9ff", Metabolic:"#fdcb6e",
    "Renal/Electrolyte":"#a29bfe", Neuro:"#fd79a8", Sepsis:"#ff7675",
    Toxicology:"#55efc4", "OB/Peds":"#fab1d3", Resuscitation:"#ff4444",
    "Critical Care":"#e17055", Baseline:"#00b894"
  };

  const quickEvents = [
    { label: "↓ BP Crisis",      color: "#ff6666", fn: () => onUpdate("vitals", { ...vitals, sbp: 72, dbp: 40, map: 51 }) },
    { label: "↓ Desat",          color: "#ff6666", fn: () => onUpdate("vitals", { ...vitals, spo2: 78, rr: 32, etco2: 48 }) },
    { label: "→ V-Fib",          color: "#ff2222", fn: () => selectRhythm("VFIB") },
    { label: "→ Asystole",       color: "#ff2222", fn: () => selectRhythm("ASYSTOLE") },
    { label: "→ V-Tach",         color: "#ff4444", fn: () => selectRhythm("VTACH") },
    { label: "→ 3° Block",       color: "#ff8800", fn: () => selectRhythm("HEART_BLOCK_3") },
    { label: "↑ K+ (Hyperkal.)", color: "#ffaa44", fn: () => { setLab("potassium", 6.9); onUpdate("vitals", { ...vitals, hr: 48, sbp: 88, dbp: 54 }); } },
    { label: "↓ K+ → TdP",      color: "#ffaa44", fn: () => { setLab("potassium", 2.1); selectRhythm("TORSADES"); } },
    { label: "↑ Troponin",       color: "#ffaa44", fn: () => setLab("troponin", 4.2) },
    { label: "↑ Lactate",        color: "#ffaa44", fn: () => setLab("lactate", 5.8) },
    { label: "Restore Normal",   color: "#00ff88", fn: () => applyScenario(ALL_SCENARIOS[ALL_SCENARIOS.length - 1]) },
  ];

  return (
    <div style={{ background: "#0e0e1a", minHeight: "100vh", color: "#e0e0f0", fontFamily: "'Courier New', monospace", padding: 20 }}>
      {/* Header */}
      <div style={{ borderBottom: "2px solid #4a4a8a", paddingBottom: 10, marginBottom: 16 }}>
        <h2 style={{ color: "#a0a0ff", margin: 0, fontSize: 16, letterSpacing: 2 }}>⚕ INSTRUCTOR CONTROL TERMINAL</h2>
        <div style={{ color: "#555", fontSize: 11, marginTop: 4 }}>Scenario: <span style={{ color: "#ffcc44" }}>{scenario}</span></div>
      </div>

      {/* Scenario Library */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ color: "#6666aa", fontSize: 10, letterSpacing: 3, marginBottom: 8 }}>
          SCENARIO LIBRARY — {ALL_SCENARIOS.length} scenarios
        </div>
        {/* Category filter tabs */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>
          {scenarioCategories.map(cat => (
            <button key={cat} onClick={() => setScenarioCat(cat)} style={{
              fontSize: 9, padding: "3px 8px", borderRadius: 10, cursor: "pointer",
              border: `1px solid ${scenarioCat === cat ? (catColors[cat] || "#8888ff") : "#333355"}`,
              background: scenarioCat === cat ? `${catColors[cat] || "#8888ff"}22` : "#111120",
              color: scenarioCat === cat ? (catColors[cat] || "#8888ff") : "#666",
              fontWeight: scenarioCat === cat ? "bold" : "normal"
            }}>{cat} {cat !== "All" ? `(${ALL_SCENARIOS.filter(s=>s.category===cat).length})` : `(${ALL_SCENARIOS.length})`}</button>
          ))}
        </div>
        {/* Scenario buttons */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
          {filteredScenarios.map(s => {
            const isActive = scenario === s.name;
            const col = catColors[s.category] || "#8888ff";
            return (
              <button key={s.name} onClick={() => applyScenario(s)} style={{
                fontSize: 10, padding: "5px 10px", borderRadius: 3, cursor: "pointer",
                border: `1px solid ${isActive ? col : col + "44"}`,
                background: isActive ? col + "22" : "#111120",
                color: isActive ? col : col + "cc",
                fontWeight: isActive ? "bold" : "normal"
              }}>{s.name}</button>
            );
          })}
        </div>

        {/* Scenario detail card */}
        {currentScenarioData && (
          <div style={{ marginTop: 12, background: "#111130", border: `1px solid ${catColors[currentScenarioData.category] || "#8888ff"}44`, borderRadius: 6, padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
              <div>
                <span style={{ color: catColors[currentScenarioData.category] || "#8888ff", fontSize: 13, fontWeight: "bold" }}>{currentScenarioData.name}</span>
                <span style={{ color: "#555", fontSize: 10, marginLeft: 10 }}>{currentScenarioData.category}</span>
              </div>
              <button onClick={() => setActiveScenario(null)} style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 14 }}>✕</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <div>
                <div style={{ color: "#6666aa", fontSize: 9, letterSpacing: 2, marginBottom: 6 }}>EXPECTED INTERVENTIONS</div>
                {currentScenarioData.interventions.map((i, idx) => (
                  <div key={idx} style={{ display: "flex", gap: 6, marginBottom: 4, alignItems: "flex-start" }}>
                    <span style={{ color: "#ffcc44", fontSize: 9, marginTop: 1, flexShrink: 0 }}>{idx + 1}.</span>
                    <span style={{ fontSize: 10, color: "#ccc", lineHeight: 1.4 }}>{i}</span>
                  </div>
                ))}
              </div>
              <div>
                <div style={{ color: "#6666aa", fontSize: 9, letterSpacing: 2, marginBottom: 6 }}>MEDICATIONS LOADED INTO MAR</div>
                {currentScenarioData.medications.map((m, idx) => (
                  <div key={idx} style={{ fontSize: 10, color: "#aaa", marginBottom: 4, padding: "3px 6px", background: "#0a0a20", borderRadius: 3, border: "1px solid #222244" }}>
                    <span style={{ color: "#fff" }}>{m.drug}</span>
                    <span style={{ color: "#6666aa" }}> {m.dose} {m.route}</span>
                    <span style={{ color: "#444", float: "right" }}>{m.due}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Rhythm Selector — categorized */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ color: "#6666aa", fontSize: 10, letterSpacing: 3, marginBottom: 8 }}>RHYTHM SELECTION</div>
        {Object.entries(rhythmCategories).map(([cat, rhythms]) => (
          <div key={cat} style={{ marginBottom: 8 }}>
            <div style={{ color: "#444", fontSize: 9, letterSpacing: 2, marginBottom: 4, textTransform: "uppercase" }}>── {cat}</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
              {rhythms.map(r => {
                const active = rhythm === r.key;
                return (
                  <button key={r.key} onClick={() => selectRhythm(r.key)} style={{
                    fontSize: 9, padding: "4px 8px", borderRadius: 3, cursor: "pointer",
                    border: `1px solid ${active ? r.color : severityBorder[r.severity] + "55"}`,
                    background: active ? severityBg[r.severity] : "#111120",
                    color: active ? r.color : severityBorder[r.severity],
                    fontWeight: active ? "bold" : "normal", opacity: active ? 1 : 0.7
                  }}>{r.label}</button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {/* Vitals sliders */}
        <div>
          <div style={{ color: "#6666aa", fontSize: 10, letterSpacing: 3, marginBottom: 8 }}>FINE-TUNE VITALS</div>
          {[
            ["hr",    "Heart Rate",   "bpm",  0,  300],
            ["sbp",   "Systolic BP",  "mmHg", 0,  260],
            ["dbp",   "Diastolic BP", "mmHg", 0,  160],
            ["map",   "MAP",          "mmHg", 0,  200],
            ["spo2",  "SpO₂",         "%",   50,  100],
            ["rr",    "Resp Rate",    "/min", 0,   60],
            ["temp",  "Temp",         "°F",  90,  110],
            ["etco2", "EtCO₂",        "mmHg", 0,   80],
          ].map(([key, label, unit, min, max]) => {
            const v = vitals[key];
            let valColor = "#fff";
            if (key === "hr"   && (v > 100 || v < 60))  valColor = v > 150 || v < 40 ? "#ff4444" : "#ffcc00";
            if (key === "sbp"  && (v < 90  || v > 160)) valColor = v < 70  || v > 180 ? "#ff4444" : "#ffcc00";
            if (key === "spo2" && v < 95)               valColor = v < 90  ? "#ff4444" : "#ffcc00";
            if (key === "rr"   && (v > 20  || v < 12))  valColor = v > 30  || v < 8   ? "#ff4444" : "#ffcc00";
            return (
              <div key={key} style={{ display: "flex", alignItems: "center", marginBottom: 6, gap: 6 }}>
                <label style={{ width: 90, fontSize: 10, color: "#666" }}>{label}</label>
                <input type="range" min={min} max={max} step={key === "temp" ? 0.1 : 1}
                  value={v} onChange={e => setVital(key, e.target.value)}
                  style={{ flex: 1, accentColor: "#6666ff", height: 3 }} />
                <span style={{ width: 64, textAlign: "right", fontSize: 12, color: valColor, fontWeight: "bold" }}>
                  {v}<span style={{ color: "#444", fontSize: 9, fontWeight: "normal" }}> {unit}</span>
                </span>
              </div>
            );
          })}
        </div>

        {/* Lab controls */}
        <div>
          <div style={{ color: "#6666aa", fontSize: 10, letterSpacing: 3, marginBottom: 8 }}>LAB VALUES</div>
          {Object.entries(labs).map(([key, lab]) => {
            const ref = lab.ref || "";
            const parts = ref.split("-").map(parseFloat);
            const isHi = parts.length === 2 && parseFloat(lab.val) > parts[1];
            const isLo = parts.length === 2 && parseFloat(lab.val) < parts[0];
            return (
              <div key={key} style={{ display: "flex", alignItems: "center", marginBottom: 5, gap: 6 }}>
                <label style={{ width: 80, fontSize: 9, color: "#666", textTransform: "uppercase" }}>{key}</label>
                <input type="number" value={lab.val} step="0.1"
                  onChange={e => setLab(key, e.target.value)}
                  style={{ width: 72, fontSize: 11, padding: "2px 5px", background: "#0a0a18", border: `1px solid ${isHi || isLo ? "#ff6644" : "#333355"}`, color: isHi || isLo ? "#ffaa44" : "#ddd", borderRadius: 3 }} />
                <span style={{ fontSize: 9, color: "#444" }}>{ref} {lab.unit}</span>
                {isHi && <span style={{ color: "#ff6644", fontSize: 9 }}>↑</span>}
                {isLo && <span style={{ color: "#6699ff", fontSize: 9 }}>↓</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Quick Events */}
      <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid #222244" }}>
        <div style={{ color: "#6666aa", fontSize: 10, letterSpacing: 3, marginBottom: 8 }}>QUICK EVENTS</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {quickEvents.map(({ label, color, fn }) => (
            <button key={label} onClick={fn} style={{
              fontSize: 10, padding: "6px 12px", borderRadius: 3, cursor: "pointer",
              border: `1px solid ${color}55`, background: `${color}14`,
              color: color, fontWeight: "bold"
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* O2 Therapy */}
      {O2Panel && <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid #222244" }}><O2Panel /></div>}

      {/* Standing Orders */}
      {StandingOrdersPanel && <div style={{ marginTop: 4 }}><StandingOrdersPanel /></div>}

      {/* Event Log */}
      {EventLogPanel && <EventLogPanel />}

    </div>
  );
}



// ─── OUTCOME ENGINE ──────────────────────────────────────────────────────────
// Each key matches a drug name as it appears in scenario MAR.
// Handler receives current state, returns { vitals?, labs?, rhythm?, note? }.
// Applied by App after a short delay to simulate pharmacokinetics.

const OUTCOME_MAP = {
  // ── VASOPRESSORS / HEMODYNAMICS ───────────────────────────────────────────
  "Norepinephrine": s => ({
    vitals: { sbp: Math.min(s.vitals.sbp+28,112), dbp: Math.min(s.vitals.dbp+14,72), map: Math.min(s.vitals.map+20,82), hr: Math.max(s.vitals.hr-6,65) },
    note: "Norepinephrine ↑ — vasopressor effect: MAP and BP improving"

function App() {
  const [state, setState] = useState({
    ...INITIAL_STATE,
    o2: { device: "room_air", applied: false },
    eventLog: [],
    standingOrders: {
      k_repletion:  { enabled: true,  threshold: 3.5, dose: "KCl 40 mEq IV over 4hrs" },
      mg_repletion: { enabled: true,  threshold: 1.8, dose: "Magnesium Sulfate 2g IV over 2hrs" },
      glucose_low:  { enabled: true,  threshold: 70,  dose: "Dextrose 50% 1 amp IV push" },
      glucose_high: { enabled: false, threshold: 180, dose: "Regular Insulin per sliding scale" },
    },
  });
  const [activeView, setActiveView] = useState("all");
  const outcomeTimers = useRef([]);
  const prevLabsRef = useRef({});

  const handleUpdate = useCallback((key, value) => {
    setState(prev => ({ ...prev, [key]: value }));
  }, []);

  const handleMARUpdate = useCallback((medId, field, value) => {
    setState(prev => ({
      ...prev,
      medications: prev.medications.map(m => m.id === medId ? { ...m, [field]: value } : m)
    }));
  }, []);

  // ── Outcome engine: fires when a med is newly marked "given" ──────────────
  useEffect(() => {
    state.medications.forEach(med => {
      if (med.status !== "given" || med._outcomeApplied) return;
      const handler = OUTCOME_MAP[med.drug];
      // Mark processed immediately (prevents double-fire)
      setState(prev => ({
        ...prev,
        medications: prev.medications.map(m => m.id === med.id ? { ...m, _outcomeApplied: true } : m),
        eventLog: [{ ts: new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"}), note: `💊 ${med.drug} ${med.dose} ${med.route} — administered`, color: "#74b9ff" }, ...prev.eventLog].slice(0,40)
      }));
      if (!handler) return;
      // Physiologic response after 2-4 second sim delay
      const tid = setTimeout(() => {
        setState(prev => {
          const out = handler(prev);
          const ts = new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
          const newVitals = out.vitals ? { ...prev.vitals, ...out.vitals } : prev.vitals;
          let newLabs = prev.labs;
          if (out.labs) {
            newLabs = { ...prev.labs };
            Object.entries(out.labs).forEach(([k,v]) => { newLabs[k] = { ...prev.labs[k], ...v }; });
          }
          const newRhythm = out.rhythm || prev.rhythm;
          const newLog = out.note
            ? [{ ts, note: `📈 ${out.note}`, color: "#00ff88" }, ...prev.eventLog].slice(0,40)
            : prev.eventLog;
          return { ...prev, vitals: newVitals, labs: newLabs, rhythm: newRhythm, eventLog: newLog };
        });
      }, 2500 + Math.random()*1500);
      outcomeTimers.current.push(tid);
    });
  }, [state.medications]);

  // ── O2 outcome engine ─────────────────────────────────────────────────────
  const prevO2Ref = useRef(null);
  useEffect(() => {
    if (!state.o2.applied) { prevO2Ref.current = null; return; }
    const key = state.o2.device;
    if (prevO2Ref.current === key) return; // already applied this device
    prevO2Ref.current = key;
    const cfg = O2_OUTCOMES[key];
    if (!cfg || cfg.spo2Delta === 0) return;
    const tid = setTimeout(() => {
      setState(prev => {
        const ts = new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
        return {
          ...prev,
          vitals: {
            ...prev.vitals,
            spo2: Math.min(prev.vitals.spo2 + cfg.spo2Delta, 99),
            rr: Math.max(prev.vitals.rr + cfg.rrDelta, 12),
          },
          eventLog: [{ ts, note: `🫁 ${cfg.note}`, color: "#a29bfe" }, ...prev.eventLog].slice(0,40)
        };
      });
    }, 3000);
    outcomeTimers.current.push(tid);
  }, [state.o2.applied, state.o2.device]);

  // ── Standing order watcher ────────────────────────────────────────────────
  useEffect(() => {
    const so = state.standingOrders;
    const labs = state.labs;
    const prev = prevLabsRef.current;
    const addSOLog = (note) => setState(p => ({
      ...p, eventLog: [{ ts: new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"}), note, color: "#fdcb6e" }, ...p.eventLog].slice(0,40)
    }));
    const k = +(labs.potassium?.val||999), mg = +(labs.magnesium?.val||999), gl = +(labs.glucose?.val||999);
    const pk = +(prev.potassium?.val||999), pmg = +(prev.magnesium?.val||999), pgl = +(prev.glucose?.val||999);
    if (so.k_repletion.enabled  && k  < so.k_repletion.threshold  && k  < pk)  addSOLog(`⚡ STANDING ORDER: K⁺ ${k} < ${so.k_repletion.threshold} mEq/L → ${so.k_repletion.dose} order placed`);
    if (so.mg_repletion.enabled && mg < so.mg_repletion.threshold && mg < pmg) addSOLog(`⚡ STANDING ORDER: Mg ${mg} < ${so.mg_repletion.threshold} mg/dL → ${so.mg_repletion.dose} order placed`);
    if (so.glucose_low.enabled  && gl < so.glucose_low.threshold  && gl < pgl) addSOLog(`⚡ STANDING ORDER: Glucose ${gl} < ${so.glucose_low.threshold} → ${so.glucose_low.dose} order placed`);
    if (so.glucose_high.enabled && gl > so.glucose_high.threshold && gl > pgl) addSOLog(`⚡ STANDING ORDER: Glucose ${gl} > ${so.glucose_high.threshold} → ${so.glucose_high.dose} order placed`);
    prevLabsRef.current = labs;
  }, [state.labs, state.standingOrders]);

  // ── Alarm computation ─────────────────────────────────────────────────────
  useEffect(() => {
    const alarms = [];
    const { vitals, rhythm } = state;
    if (vitals.hr > 150 || vitals.hr < 40) alarms.push(`HR ${vitals.hr} bpm — out of range`);
    if (vitals.sbp < 90) alarms.push(`BP ${vitals.sbp}/${vitals.dbp} — hypotension`);
    if (vitals.spo2 < 92) alarms.push(`SpO₂ ${vitals.spo2}% — desaturation`);
    if (rhythm === "VFIB")    alarms.push("V-FIB DETECTED — Call code");
    if (rhythm === "ASYSTOLE") alarms.push("ASYSTOLE — No pulse");
    if (rhythm === "VTACH")   alarms.push("V-TACH — Prepare for cardioversion");
    setState(prev => ({ ...prev, alarms }));
  }, [state.vitals, state.rhythm]);
  const views = ["all", "instructor", "student", "monitor"];

  // ── O2 Panel component (passed as prop to InstructorPanel) ─────────────────
  const O2Panel = () => {
    const DEVICES = [
      { key:"room_air",    icon:"🌬️", label:"Room Air",      fio2:"21%"     },
      { key:"nasal_2",     icon:"👃", label:"NC 2L",         fio2:"28%"     },
      { key:"nasal_4",     icon:"👃", label:"NC 4L",         fio2:"36%"     },
      { key:"nasal_6",     icon:"👃", label:"NC 6L",         fio2:"44%"     },
      { key:"simple_mask", icon:"😷", label:"Simple Mask",   fio2:"40-60%"  },
      { key:"venturi_28",  icon:"🎭", label:"Venturi 28%",   fio2:"28% ctrl"},
      { key:"venturi_35",  icon:"🎭", label:"Venturi 35%",   fio2:"35% ctrl"},
      { key:"nrb",         icon:"💨", label:"NRB 15L",       fio2:"~90%"    },
      { key:"hfnc_40",     icon:"🌊", label:"HFNC 40L/40%", fio2:"40% HF"  },
      { key:"hfnc_60",     icon:"🌊", label:"HFNC 60L/60%", fio2:"60% HF"  },
      { key:"cpap",        icon:"🔄", label:"CPAP",          fio2:"Variable"},
      { key:"bipap",       icon:"🔄", label:"BiPAP",         fio2:"Variable"},
    ];
    const cur = state.o2;
    const curLabel = DEVICES.find(d=>d.key===cur.device)?.label || cur.device;
    return (
      <div style={{ background:"#060f20", border:"1px solid #0d2a50", borderRadius:6, padding:10, marginBottom:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <span style={{ color:"#4d9ef5", fontSize:10, fontWeight:"bold", letterSpacing:2 }}>🫁 OXYGEN THERAPY</span>
          <span style={{ fontSize:10, fontWeight:"bold", color: cur.applied ? "#00ff88" : "#ff5555" }}>
            {cur.applied ? `✓ ON — ${curLabel}` : "⊘ OFF"}
          </span>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginBottom:8 }}>
          {DEVICES.map(d => (
            <button key={d.key} onClick={() => handleUpdate("o2", { ...cur, device:d.key, applied:false })}
              style={{ fontSize:9, padding:"3px 7px", borderRadius:3, cursor:"pointer",
                border:`1px solid ${cur.device===d.key?"#2d6abf":"#0d2a50"}`,
                background: cur.device===d.key ? "#0d2a50" : "#030810",
                color: cur.device===d.key ? "#74b9ff" : "#2d5080",
                fontWeight: cur.device===d.key ? "bold" : "normal" }}>
              {d.icon} {d.label}
              <span style={{ color:"#1a3050", fontSize:7, marginLeft:3 }}>{d.fio2}</span>
            </button>
          ))}
        </div>
        <button onClick={() => {
          const nowOn = !cur.applied;
          handleUpdate("o2", { ...cur, applied: nowOn });
          if (nowOn) {
            setState(prev => ({
              ...prev,
              o2: { ...prev.o2, applied: true },
              eventLog: [{ ts: new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),
                note: `🫁 O₂ applied: ${curLabel} — awaiting SpO₂ response`, color:"#a29bfe" },
                ...prev.eventLog].slice(0,40)
            }));
          }
        }} style={{
          fontSize:11, padding:"5px 18px", borderRadius:4, cursor:"pointer", fontWeight:"bold",
          border:`1px solid ${cur.applied?"#aa3333":"#006633"}`,
          background: cur.applied ? "#1a0505" : "#001a0d",
          color: cur.applied ? "#ff6666" : "#00dd66"
        }}>
          {cur.applied ? "⏹ Remove O₂" : "▶ Apply O₂"}
        </button>
      </div>
    );
  };

  // ── Standing Orders Panel ─────────────────────────────────────────────────
  const StandingOrdersPanel = () => {
    const so = state.standingOrders;
    const rows = [
      { key:"k_repletion",  label:"K⁺ Repletion",     labKey:"potassium", unit:"mEq/L", dir:"<", color:"#f0c040" },
      { key:"mg_repletion", label:"Mg Repletion",      labKey:"magnesium", unit:"mg/dL", dir:"<", color:"#b388ff" },
      { key:"glucose_low",  label:"Hypoglycemia Tx",   labKey:"glucose",   unit:"mg/dL", dir:"<", color:"#ff8a65" },
      { key:"glucose_high", label:"Hyperglycemia Tx",  labKey:"glucose",   unit:"mg/dL", dir:">", color:"#ffcc44" },
    ];
    return (
      <div style={{ background:"#0a140a", border:"1px solid #0d280d", borderRadius:6, padding:10, marginBottom:12 }}>
        <div style={{ color:"#00bb55", fontSize:10, fontWeight:"bold", letterSpacing:2, marginBottom:8 }}>📋 STANDING ORDERS — AUTO-REPLETION</div>
        {rows.map(row => {
          const ord = so[row.key];
          const curVal = +(state.labs[row.labKey]?.val || 0);
          const triggered = ord.enabled && curVal > 0 && (row.dir==="<" ? curVal < ord.threshold : curVal > ord.threshold);
          return (
            <div key={row.key} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:5, padding:"3px 6px",
              background: triggered ? "#0d1f0d" : "#050a05",
              border:`1px solid ${triggered?"#1a4a1a":"#0a180a"}`, borderRadius:3 }}>
              <button onClick={() => handleUpdate("standingOrders", { ...so, [row.key]:{ ...ord, enabled:!ord.enabled } })}
                style={{ fontSize:9, padding:"2px 5px", borderRadius:2, cursor:"pointer", border:"none",
                  background: ord.enabled ? "#006633" : "#222", color:"white", minWidth:30 }}>
                {ord.enabled ? "ON" : "OFF"}
              </button>
              <span style={{ color:row.color, fontSize:10, width:108, flexShrink:0 }}>{row.label}</span>
              <span style={{ color:"#444", fontSize:9 }}>{row.dir}</span>
              <input type="number" value={ord.threshold} step={row.key.includes("glucose") ? 5 : 0.1}
                onChange={e => handleUpdate("standingOrders", { ...so, [row.key]:{ ...ord, threshold:+e.target.value } })}
                style={{ width:48, fontSize:10, padding:"1px 3px", background:"#111", border:"1px solid #333", color:"#ccc", borderRadius:2 }} />
              <span style={{ color:"#333", fontSize:9, flexShrink:0 }}>{row.unit}</span>
              <span style={{ color:"#334", fontSize:9, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{ord.dose}</span>
              {triggered && <span style={{ color:"#00ff88", fontSize:9, fontWeight:"bold", flexShrink:0 }}>⚡ ACTIVE</span>}
            </div>
          );
        })}
      </div>
    );
  };

  // ── Event Log ─────────────────────────────────────────────────────────────
  const EventLogPanel = () => (
    <div style={{ background:"#08080f", border:"1px solid #15152a", borderRadius:6, padding:10, marginTop:12, maxHeight:172, overflowY:"auto" }}>
      <div style={{ color:"#44446a", fontSize:9, letterSpacing:2, marginBottom:6, fontWeight:"bold" }}>SIMULATION EVENT LOG</div>
      {state.eventLog.length === 0
        ? <div style={{ color:"#222", fontSize:10, fontStyle:"italic" }}>No events yet — give a medication or apply O₂ to see live outcomes</div>
        : state.eventLog.map((ev,i) => (
          <div key={i} style={{ display:"flex", gap:8, marginBottom:2, fontSize:10 }}>
            <span style={{ color:"#333", fontFamily:"monospace", minWidth:72 }}>{ev.ts}</span>
            <span style={{ color:ev.color }}>{ev.note}</span>
          </div>
        ))
      }
    </div>
  );

  return (
    <div style={{ fontFamily: "sans-serif" }}>
      <div style={{ background:"#0d1117", padding:"8px 16px", display:"flex", gap:8, alignItems:"center", borderBottom:"2px solid #30363d" }}>
        <span style={{ color:"#58a6ff", fontSize:12, fontWeight:"bold", marginRight:8 }}>SimLab EMR</span>
        {views.map(v => (
          <button key={v} onClick={() => setActiveView(v)} style={{
            fontSize:11, padding:"4px 12px", borderRadius:4, cursor:"pointer", border:"none",
            background: activeView===v ? "#58a6ff" : "#21262d",
            color: activeView===v ? "#000" : "#8b949e",
            fontWeight: activeView===v ? "bold" : "normal", textTransform:"capitalize"
          }}>
            {v==="all" ? "All Views" : v==="instructor" ? "Instructor" : v==="student" ? "Student EMR" : "Bedside Monitor"}
          </button>
        ))}
        <span style={{ marginLeft:"auto", color:"#555", fontSize:10 }}>All screens share live data</span>
      </div>

      {activeView === "all" ? (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:0 }}>
          <div style={{ borderRight:"2px solid #333", borderBottom:"2px solid #333" }}>
            <div style={{ background:"#161b22", padding:"4px 12px", fontSize:10, color:"#58a6ff", letterSpacing:2, fontFamily:"monospace" }}>INSTRUCTOR TERMINAL</div>
            <div style={{ transform:"scale(0.72)", transformOrigin:"top left", width:"138%", pointerEvents:"all" }}>
              <InstructorPanel state={state} onUpdate={handleUpdate} O2Panel={O2Panel} StandingOrdersPanel={StandingOrdersPanel} EventLogPanel={EventLogPanel} />
            </div>
          </div>
          <div style={{ borderBottom:"2px solid #333" }}>
            <div style={{ background:"#161b22", padding:"4px 12px", fontSize:10, color:"#58a6ff", letterSpacing:2, fontFamily:"monospace" }}>STUDENT EMR TERMINAL</div>
            <div style={{ transform:"scale(0.72)", transformOrigin:"top left", width:"138%", pointerEvents:"all" }}>
              <StudentEMR state={state} onMARUpdate={handleMARUpdate} />
            </div>
          </div>
          <div style={{ gridColumn:"1 / -1" }}>
            <div style={{ background:"#161b22", padding:"4px 12px", fontSize:10, color:"#00ff88", letterSpacing:2, fontFamily:"monospace" }}>BEDSIDE MONITOR</div>
            <BedsideMonitor state={state} />
          </div>
        </div>
      ) : activeView === "instructor" ? (
        <InstructorPanel state={state} onUpdate={handleUpdate} O2Panel={O2Panel} StandingOrdersPanel={StandingOrdersPanel} EventLogPanel={EventLogPanel} />
      ) : activeView === "student" ? (
        <StudentEMR state={state} onMARUpdate={handleMARUpdate} />
      ) : (
        <BedsideMonitor state={state} />
      )}
    </div>
  );
}

    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
